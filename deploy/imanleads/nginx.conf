server {
  listen 80;
  listen [::]:80;
  server_name work.imanleads.com;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/acme;
    default_type "text/plain";
    try_files $uri =404;
  }

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name work.imanleads.com;

  include snippets/ssl-params.conf;
  ssl_certificate /etc/nginx/ssl/work.imanleads.com/work.imanleads.com.crt;
  ssl_certificate_key /etc/nginx/ssl/work.imanleads.com/work.imanleads.com.key;

  include snippets/cloudflare-allow.conf;

  client_max_body_size 55m;

  location ^~ /kan-avatars/ {
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_pass http://127.0.0.1:3901;
  }

  location ^~ /kan-attachments/ {
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 600s;
    add_header Cache-Control "private, no-store" always;
    proxy_pass http://127.0.0.1:3901;
  }

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 600s;
    proxy_pass http://127.0.0.1:3900;
  }
}
